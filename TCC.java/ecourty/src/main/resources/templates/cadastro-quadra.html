<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro de quadras</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Cadastro de Quadras</h1>

      <label class="form-label">Nome da Quadra</label>
      <input type="text" id="nome" class="form-control" />

      <label>Tipo</label>
      <select id="tipo">
        <option>Futebol Society</option>
        <option>Futsal</option>
        <option>Vôlei</option>
        <option>Basquete</option>
        <option>Tênis</option>
        <option>Beach Tennis</option>
      </select>

      <label>Valor por Hora</label>
      <input type="number" id="valorHora" />

      <button onclick="cadastrarQuadra()">Cadastrar</button>

      <hr />

      <table id="tabela_quadras">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Valor/Hora</th>
          </tr>
        </thead>

        <tbody></tbody>
      </table>
    </div>

    <script src="quadras.js"></script>
  </body>
</html>
